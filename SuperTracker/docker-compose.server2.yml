# ─────────────────────────────────────────────────────────────────
#  SERVIDOR 2 – Agregador + API REST + PostgreSQL + Frontend + Traefik
# ─────────────────────────────────────────────────────────────────

services:

  traefik:
    image: traefik:v2.11
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.file.directory=/etc/traefik/dynamic"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"    # Traefik dashboard (desarrollo)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik/dynamic
    networks:
      - app_net
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: superprecios
      POSTGRES_USER: superprecios_user
      POSTGRES_PASSWORD: superprecios_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superprecios_user -d superprecios"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net
    restart: unless-stopped

  aggregator:
    build:
      context: ./aggregator
      dockerfile: Dockerfile
    container_name: aggregator
    environment:
      RABBITMQ_HOST: rabbitmq #"${RABBITMQ_HOST:-192.168.1.10}"   # IP interna del Servidor 1
      RABBITMQ_PORT: "5672"
      RABBITMQ_QUEUE: precios_queue
      DATABASE_URL: postgresql://superprecios_user:superprecios_pass@postgres:5432/superprecios
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net
      - superprecios_scraping_net
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    environment:
      DATABASE_URL: postgresql://superprecios_user:superprecios_pass@postgres:5432/superprecios
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`superprecios.local`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    networks:
      - app_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`superprecios.local`) || Host(`localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    networks:
      - app_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app_net:
    driver: bridge
  superprecios_scraping_net:
    external: true
