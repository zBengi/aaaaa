# ─────────────────────────────────────────────────────────────────
#  SERVIDOR 2 – Agregador + API REST + PostgreSQL + Frontend + Traefik
# ─────────────────────────────────────────────────────────────────

services:

  # Proxy que expone SOLO los endpoints mínimos del Docker API a Traefik,
  # en vez de montarle /var/run/docker.sock directo (evita fuga de host).
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker_socket_proxy
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      SERVICES: 0
      TASKS: 0
      POST: 0          # solo lectura
      LOG_LEVEL: warning
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app_net
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL

  traefik:
    image: traefik:v2.11
    container_name: traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://docker-socket-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL:?falta TRAEFIK_ACME_EMAIL en .env.server2}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--api.dashboard=true"
      - "--log.level=WARN"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik:/etc/traefik/dynamic:ro
      - traefik_certs:/letsencrypt
    depends_on:
      - docker-socket-proxy
    labels:
      # Dashboard SOLO en HTTPS + con usuario/clave (basicAuth)
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${TRAEFIK_DOMAIN:?falta TRAEFIK_DOMAIN en .env.server2}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth"
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_USER}:${TRAEFIK_DASHBOARD_HASH}"
    networks:
      - app_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?falta POSTGRES_DB en .env.server2}
      POSTGRES_USER: ${POSTGRES_USER:?falta POSTGRES_USER en .env.server2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?falta POSTGRES_PASSWORD en .env.server2}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No se publican puertos al host: solo accesible dentro de app_net.
    networks:
      - app_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  aggregator:
    build:
      context: ./aggregator
      dockerfile: Dockerfile
    container_name: aggregator
    environment:
      RABBITMQ_HOST: ${RABBITMQ_HOST:?falta RABBITMQ_HOST en .env.server2}   # IP privada/VPN del Servidor 1
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-precios_queue}
      RABBITMQ_CONSUMER_USER: ${RABBITMQ_CONSUMER_USER:?falta RABBITMQ_CONSUMER_USER en .env.server2}
      RABBITMQ_CONSUMER_PASS: ${RABBITMQ_CONSUMER_PASS:?falta RABBITMQ_CONSUMER_PASS en .env.server2}
      DATABASE_URL: ${DATABASE_URL:?falta DATABASE_URL en .env.server2}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net
      - superprecios_scraping_net
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    environment:
      DATABASE_URL: ${DATABASE_URL:?falta DATABASE_URL en .env.server2}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?falta CORS_ALLOWED_ORIGINS en .env.server2}
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${TRAEFIK_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api.middlewares=security-headers,api-ratelimit"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    networks:
      - app_net
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frontend.middlewares=security-headers"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    networks:
      - app_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

volumes:
  postgres_data:
  traefik_certs:

networks:
  app_net:
    driver: bridge
  superprecios_scraping_net:
    external: true
