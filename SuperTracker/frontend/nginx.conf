server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # No revelar la versión de Nginx en cabeceras/errores
    server_tokens off;

    # Cabeceras de seguridad
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; frame-ancestors 'none'" always;
    # Solo tiene efecto detrás de HTTPS (Traefik); es inofensivo servido por HTTP.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Proxy hacia la API REST (dentro de la red Docker)
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://api:8000/health;
    }

    # Soporte React Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}