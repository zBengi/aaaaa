# traefik/dynamic.yml
# Configuración dinámica de Traefik: reglas de enrutamiento adicionales.
# Los servicios principales se configuran vía labels en docker-compose.server2.yml.

http:
  middlewares:
    # Strip prefijo /api antes de reenviar a FastAPI
    strip-api-prefix:
      stripPrefix:
        prefixes:
          - "/api"

    # Cabeceras de seguridad aplicadas a nivel de proxy (además de las
    # que ya agregan Nginx y la API — defensa en profundidad).
    security-headers:
      headers:
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: "no-referrer-when-downgrade"
        customResponseHeaders:
          Permissions-Policy: "geolocation=(), microphone=(), camera=()"
          Server: ""

    # Rate limit a nivel de proxy para /api — capa extra sobre el
    # rate limit de slowapi ya presente en FastAPI.
    api-ratelimit:
      rateLimit:
        average: 60
        burst: 30
        period: 1m

tls:
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
